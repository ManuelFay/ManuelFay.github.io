{% assign stats_url = site.external_services.github_readme_stats_url | default: "https://github-readme-stats.vercel.app" %}
{% assign lang = site.lang | split: '-' | first %}

<div class="repo p-2 text-center">
  <a href="https://github.com/{{ include.username }}">
    <img
      class="repo-img-light w-100"
      alt="{{ include.username }}"
      src="{{ stats_url }}/api/?username={{ include.username }}&theme={{ site.repo_theme_light }}&locale={{ lang }}&show_icons=true"
      onerror="var r=this.closest('.repo'); this.style.display='none'; r.dataset.repoImageErrors=(+r.dataset.repoImageErrors||0)+1; if(+r.dataset.repoImageErrors>=2) r.classList.add('repo--fallback');"
      onload="this.closest('.repo').classList.remove('repo--fallback');"
    >
    <img
      class="repo-img-dark w-100"
      alt="{{ include.username }}"
      src="{{ stats_url }}/api/?username={{ include.username }}&theme={{ site.repo_theme_dark }}&locale={{ lang }}&show_icons=true"
      onerror="var r=this.closest('.repo'); this.style.display='none'; r.dataset.repoImageErrors=(+r.dataset.repoImageErrors||0)+1; if(+r.dataset.repoImageErrors>=2) r.classList.add('repo--fallback');"
      onload="this.closest('.repo').classList.remove('repo--fallback');"
    >
    <span class="repo-fallback">
      <span class="repo-fallback-title">{{ include.username }}</span>
      <span class="repo-fallback-owner">GitHub profile</span>
      <span class="repo-fallback-action">View on GitHub</span>
    </span>
  </a>
</div>
