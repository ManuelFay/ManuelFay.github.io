{% assign trophy_url = site.external_services.github_profile_trophy_url | default: "https://github-profile-trophy.vercel.app" %}

<div class="repo p-2 text-center">
  <a href="https://github.com/ryo-ma/github-profile-trophy">
    <img
      class="repo-img-light w-200"
      alt="{{ include.username }}"
      src="{{ trophy_url }}/?username={{ include.username }}&theme={{ site.repo_trophies.theme_light }}&locale={{ site.lang }}&margin-w=15&margin-h=15&no-bg=true&rank=-C"
      onerror="var r=this.closest('.repo'); this.style.display='none'; r.dataset.repoImageErrors=(+r.dataset.repoImageErrors||0)+1; if(+r.dataset.repoImageErrors>=2) r.classList.add('repo--fallback');"
      onload="this.closest('.repo').classList.remove('repo--fallback');"
    >
    <img
      class="repo-img-dark w-200"
      alt="{{ include.username }}"
      src="{{ trophy_url }}/?username={{ include.username }}&theme={{ site.repo_trophies.theme_dark }}&locale={{ site.lang }}&margin-w=15&margin-h=15&no-bg=true&rank=-C"
      onerror="var r=this.closest('.repo'); this.style.display='none'; r.dataset.repoImageErrors=(+r.dataset.repoImageErrors||0)+1; if(+r.dataset.repoImageErrors>=2) r.classList.add('repo--fallback');"
      onload="this.closest('.repo').classList.remove('repo--fallback');"
    >
    <span class="repo-fallback">
      <span class="repo-fallback-title">{{ include.username }}</span>
      <span class="repo-fallback-owner">GitHub trophies</span>
      <span class="repo-fallback-action">View source project</span>
    </span>
  </a>
</div>
